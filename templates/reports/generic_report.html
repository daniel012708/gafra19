<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <style>
    body{ font-family: Arial, Helvetica, sans-serif; color:#111; }
    h1{ text-align:center; font-size:20px; margin-bottom:6px }
    .meta{ text-align:center; color:#666; font-size:12px; margin-bottom:18px }
    table{ width:100%; border-collapse:collapse; font-size:12px; }
    th, td{ padding:6px 8px; border:1px solid #e6e9f0; }
    th{ background:#f5f7ff; font-weight:700; }
    .footer{ margin-top:20px; font-size:11px; color:#666; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  {% if subtitle %}<div class="meta">{{ subtitle }}</div>{% endif %}
  <table>
    <thead>
      <tr>
        {% for c in columns %}<th>{{ c }}</th>{% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
        <tr>
          {% for cell in row %}<td>{{ cell }}</td>{% endfor %}
        </tr>
      {% endfor %}
    </tbody>
  </table>
  <div class="footer">Generado: {{ ahora }}</div>
</body>
</html>
