{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
	<div class="card shadow-sm">
		<div class="card-body p-4 p-lg-5">
			<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
				<div>
					<h3 class="mb-1">Reporte de Usuarios</h3>
					<p class="text-muted mb-0">{{ total_usuarios }} usuario{{ total_usuarios|pluralize }} después del filtro aplicado.</p>
				</div>
			</div>

			<form method="get" class="row g-3 mb-4">
				<div class="col-md-4">
					<label class="form-label">Búsqueda rápida</label>
					<input type="search" name="q" value="{{ q }}" class="form-control" placeholder="Usuario, nombre o email">
				</div>
				<div class="col-md-4">
					<label class="form-label">Rol</label>
					<select name="rol" class="form-select">
						<option value="">Todos</option>
						<option value="admin" {% if rol == 'admin' %}selected{% endif %}>Administrador</option>
						<option value="vendedor" {% if rol == 'vendedor' %}selected{% endif %}>Vendedor</option>
						<option value="almacenista" {% if rol == 'almacenista' %}selected{% endif %}>Almacenista</option>
						<option value="logistica" {% if rol == 'logistica' %}selected{% endif %}>Logística</option>
						<option value="cliente" {% if rol == 'cliente' %}selected{% endif %}>Cliente</option>
					</select>
				</div>
				<div class="col-md-4">
					<label class="form-label">Estado</label>
					<select name="estado" class="form-select">
						<option value="">Todos</option>
						<option value="activo" {% if estado == 'activo' %}selected{% endif %}>Activo</option>
						<option value="inactivo" {% if estado == 'inactivo' %}selected{% endif %}>Inactivo</option>
					</select>
				</div>
				<div class="col-12 d-flex flex-wrap gap-2 justify-content-end">
					<button type="submit" class="btn btn-outline-primary">Aplicar filtros</button>
					<button type="submit" name="export" value="pdf" class="btn btn-login">Descargar PDF filtrado</button>
					<button type="submit" name="export" value="csv" class="btn btn-outline-secondary">Descargar CSV filtrado</button>
				</div>
			</form>

			<div class="alert alert-info mb-0">
				Los filtros se aplican al listado, al PDF y al CSV.
			</div>
		</div>
	</div>
</div>
{% endblock %}
