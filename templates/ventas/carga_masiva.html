{% extends 'base.html' %}
{% block content %}
<h2>Carga masiva de ventas desde Excel</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Subir archivo</button>
</form>
<p class="mt-3">Descarga un ejemplo válido: <a href="?template=1">ejemplo_ventas.xlsx</a></p>
{% endblock %}
