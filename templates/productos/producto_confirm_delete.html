{% extends 'base.html' %}
{% block head_title %}Eliminar producto{% endblock %}
{% block header_title %}Eliminar producto{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h5 class="mb-0">Eliminar producto</h5></div>
    <div class="card-body">
        <p>¿Seguro que deseas eliminar "{{ object }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'productos:list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
