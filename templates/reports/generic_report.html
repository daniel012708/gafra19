<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <style>
    @page { size: A4; margin: 14mm 10mm; }
    body{ font-family: Arial, Helvetica, sans-serif; color:#111; }
    h1{ text-align:center; font-size:20px; margin:0 0 6px; }
    .meta{ text-align:center; color:#666; font-size:11px; margin-bottom:14px; }
    table{ width:100%; border-collapse:collapse; table-layout:fixed; font-size:10px; }
    th, td{
      padding:6px 7px;
      border:1px solid #e6e9f0;
      vertical-align:top;
      word-break:break-word;
      overflow-wrap:anywhere;
    }
    th{ background:#0f172a; color:#fff; font-weight:700; }
    tbody tr:nth-child(even){ background:#f8fafc; }
    .footer{ margin-top:14px; font-size:10px; color:#666; }
    .compact table{ font-size:9px; }
    .compact th, .compact td{ padding:4px 5px; }
  </style>
</head>
<body class="{% if columns|length > 8 %}compact{% endif %}">
  <h1>{{ title }}</h1>
  {% if subtitle %}<div class="meta">{{ subtitle }}</div>{% endif %}
  <table>
    <thead>
      <tr>
        {% for c in columns %}<th>{{ c }}</th>{% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
        <tr>
          {% for cell in row %}<td>{{ cell }}</td>{% endfor %}
        </tr>
      {% endfor %}
    </tbody>
  </table>
  <div class="footer">Generado: {{ ahora }}</div>
</body>
</html>
